<div class="mercados">
  <div class="mercado" *ngFor="let m of mercados; track $index" (click)="abrirModal(m)">
    <img src="{{ m.image }}" />
    <p>{{ m.name }}</p>
    <p>R$ {{ m.price }}</p>
    <p>⭐ {{ m.nota }} — {{ m.tempo_entrega }} min</p>
  </div>
</div>
<app-modal-card *ngIf="abriu" [show]="abriu" (dataChange)="abriu = $event" [item]="itemSelecionado" />

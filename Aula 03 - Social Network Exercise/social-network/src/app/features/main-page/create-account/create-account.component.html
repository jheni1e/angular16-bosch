<div class="container">
  <div class="card">
    <h1>Register a New Account</h1>

    <app-validate-cpf (dataChange)="cpfChanged($event)"(validChange)="cpfValido = $event"></app-validate-cpf>

    <label>Senha:</label>
    <input type="password" placeholder="Digite sua senha aqui..." (change)="changed($event)" />

    <button (click)="submit()">Salvar</button>
  </div>
</div>
